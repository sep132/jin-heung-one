<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>파이그래프 예제</title>
	<style>
		canvas { border: 1px solid #ccc; background-color: #f9f9f9; }
	</style>
</head>
<body>
	<h2>좋아하는 과일 (파이그래프)</h2>
	<canvas id="pieChart" width="500" height="400"></canvas>
	<script>
		const data = [
			{ label:"사과", value: 40 },
			{ label:"바나나", value: 35 },
			{ label:"오렌지", value: 30 },
			{ label:"포도", value: 25 }
		]
		const canvas = document.querySelector("#pieChart")
		const ctx = canvas.getContext("2d")
		let totalValue = 0;
		data.forEach(item => totalValue+=item.value) //전체 숫자의 합계 구하기
		const centerX = canvas.width / 2 - 50 //원의 중심점 좌우(약간 왼쪽으로 이동)
		const centerY = canvas.height / 2 //원의 중심점 세로(가운데)
		const radius = 120 //원의 반지름
		let startAngle = 0; //시작 각도(파이를 그릴 때마다 더해짐)
		data.forEach((item, index) => {
			const sliceAngle = (item.value / totalValue) * (2 * Math.PI) //조각 각도 크기
			const endAngle = startAngle + sliceAngle //조각 의 끝 각도
			ctx.beginPath()
			ctx.moveTo(centerX, centerY)
			ctx.arc(centerX, centerY, radius, startAngle, endAngle)
			ctx.closePath()
			const bgColor = `hsl(${index * 40 + 10}, 75%, 65%)`
			ctx.fillStyle = bgColor
			ctx.fill()
			ctx.strokeStyle = '#fff'
			ctx.lineWidth = 2
			ctx.stroke()
			
			const middleAngle = startAngle + sliceAngle / 2 //조각의 가운데
			ctx.save() // 현재 상태 저장
			ctx.translate(centerX, centerY) //캔버스 중심점을 파이차트 가운데로 이동
			ctx.rotate(middleAngle)
			ctx.translate(radius * 0.65, 0)
			ctx.rotate(Math.PI / 2)
			ctx.fillStyle = '#fff'
			ctx.font = 'bold 12px Arial'
			ctx.textAlign = 'center'
			ctx.textBaseLine = 'bottom'
			const percent = Math.round((item.value/totalValue) * 100)
			ctx.fillText(`${percent}%`, 0, 0)
			ctx.restore() //변경된 자표를 원래대로 복구

			//오른쪽에 범례(legend) 표시
			const legendX = canvas.width - 130
			const legendY = 100 + index * 30
			ctx.fillStyle = bgColor
			ctx.fillRect(legendX, legendY, 18, 18)
			ctx.fillStyle = '#333'
			ctx.font = '14px Arial'
			ctx.textAlign = 'left'
			ctx.textBaseLine = 'bottom'
			ctx.fillText(`${item.label} (${item.value})`, legendX+24, legendY+14) 
			startAngle = endAngle
		})

	</script>
</body>
</html>
